<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpg" href="assets/c..jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"> <!-- Include Font Awesome CSS -->
    <title>Contact Us - Online Quiz</title>
    <style>
        /* Your CSS styles here */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #007BFF;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.2rem;
        }

        .contact-info {
            margin-top: 20px;
            text-align: center;
        }

        .contact-info h2 {
            color: #007BFF;
            font-size: 1.8rem;
        }

        .contact-info p {
            color: #666;
            font-size: 1.2rem;
        }

        .social-media {
            text-align: center;
            margin-top: 30px;
        }

        .social-media a {
            font-size: 24px;
            color: #007BFF;
            margin: 0 15px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-media a:hover {
            color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Contact Us</h1>
            <p>Have questions or feedback? Feel free to reach out to us!</p>
        </div>

        <div class="contact-info">
            <h2>Contact Information</h2>
            <p>Email: contact@onlinequiz.com</p>
            <p>Phone: +1 (123) 456-7890</p>
            <p>Address: 123 Quiz Avenue, city, Country</p>
        </div>

        <div class="social-media">
            <h2>Follow Us on Social Media</h2>
            <a href="https://www.instagram.com/your_quiz_platform/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/your_quiz_platform/" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://twitter.com/your_quiz_platform/" target="_blank"><i class="fab fa-twitter"></i></a>
            <!-- Add more social media links and icons as needed -->
        </div>
    </div>
</body>
</html>
